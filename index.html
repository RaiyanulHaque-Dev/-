<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Panel — SMT Receipt System</title>

<link rel="stylesheet" href="style.css" />

<style>
.setup-notice {
  background: #fff3cd;
  border: 1.5px solid #ffc107;
  border-radius: 6px;
  padding: 1rem;
  margin-bottom: 1.5rem;
  font-size: 0.85rem;
  color: #664d00;
}
.config-row {
  display: flex;
  gap: 0.6rem;
  margin-bottom: 1.5rem;
}
.config-row input {
  flex: 1;
  padding: 0.6rem;
}
#txnIdGroup { display: none; }
</style>

</head>
<body>

<header class="site-header">
  <div class="brand"><span>SMT</span> Receipt System</div>
  <nav>
    <a href="index.html" class="active">Admin</a>
    <a href="verify.html">Verify</a>
  </nav>
</header>

<div class="page-wrap">

  <h1 class="page-title">Generate Receipt</h1>
  <p class="page-sub">Admin Panel</p>

  <div class="setup-notice">
    Paste your Apps Script URL below first.
  </div>

  <div class="config-row">
    <input type="url" id="apiUrl" placeholder="Paste API URL here">
    <button class="btn btn-outline" onclick="saveApiUrl()">Save</button>
  </div>

  <div class="card">
    <form id="receiptForm">

      <div class="form-grid">

        <div class="form-group">
          <label>Name</label>
          <input id="memberName" required>
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input id="phone" required>
        </div>

        <div class="form-group">
          <label>Amount</label>
          <input type="number" id="amount" required>
        </div>

        <div class="form-group">
          <label>Payment</label>
          <select id="paymentMethod" onchange="handlePaymentChange()" required>
            <option value="">Select</option>
            <option>Cash</option>
            <option>bKash</option>
            <option>Nagad</option>
            <option>Bank Transfer</option>
          </select>
        </div>

        <div class="form-group" id="txnIdGroup">
          <label>Transaction ID</label>
          <input id="transactionId">
        </div>

        <div class="form-group">
          <label>Purpose</label>
          <input id="purpose" required>
        </div>

        <div class="form-group">
          <label>Created By</label>
          <input id="createdBy" required>
        </div>

        <div class="form-group">
          <label>Notes</label>
          <input id="notes">
        </div>

      </div>

      <br>

      <button id="submitBtn" class="btn btn-primary">
        Generate Receipt →
      </button>

    </form>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'smt_api_url';

// Load saved API URL
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) document.getElementById('apiUrl').value = saved;
});

// Save API
function saveApiUrl() {
  const url = document.getElementById('apiUrl').value.trim();
  if (!url) return showToast('Enter API URL');
  localStorage.setItem(STORAGE_KEY, url);
  showToast('Saved ✓');
}

// Payment toggle
function handlePaymentChange() {
  const method = document.getElementById('paymentMethod').value;
  const grp = document.getElementById('txnIdGroup');

  if (method === 'bKash' || method === 'Nagad' || method === 'Bank Transfer') {
    grp.style.display = 'block';
  } else {
    grp.style.display = 'none';
  }
}

// Generate ID
function generateReceiptId() {
  return 'SMT-' + Date.now();
}

// Get time
function getNow() {
  const now = new Date();
  return {
    date: now.toLocaleDateString(),
    time: now.toLocaleTimeString()
  };
}

// Submit form
document.getElementById('receiptForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const apiUrl = localStorage.getItem(STORAGE_KEY);
  if (!apiUrl) return showToast('Save API URL first');

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerText = 'Saving...';

  const { date, time } = getNow();

  const data = {
    receiptId: generateReceiptId(),
    memberName: memberName.value,
    phone: phone.value,
    amount: amount.value,
    paymentMethod: paymentMethod.value,
    transactionId: transactionId.value || 'N/A',
    purpose: purpose.value,
    date,
    time,
    createdBy: createdBy.value,
    notes: notes.value
  };

  try {
    await fetch(apiUrl, {
      method: 'POST',
      body: JSON.stringify({ action: 'create', ...data }),
      mode: 'no-cors'
    });

    showToast('Receipt Saved ✓');

    sessionStorage.setItem('receipt', JSON.stringify(data));

    setTimeout(() => {
      window.location.href = 'receipt.html';
    }, 1000);

  } catch (err) {
    showToast('Error saving');
    btn.disabled = false;
    btn.innerText = 'Generate Receipt →';
  }
});

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>

</body>
</html>
